<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 13px; fill: #64748b; }
      .section-title { font-size: 16px; font-weight: 700; fill: #1e293b; }
      .card-title { font-size: 14px; font-weight: 700; fill: #0f172a; }
      .card-body { font-size: 11.5px; fill: #334155; }
      .tag { font-size: 10px; fill: #fff; font-weight: 600; }
      .before-fill { fill: #fef2f2; stroke: #fca5a5; }
      .after-fill { fill: #ecfdf5; stroke: #6ee7b7; }
      .w0-fill { fill: #eff6ff; stroke: #93c5fd; }
      .wave-fill { fill: #f8fafc; stroke: #cbd5e1; }
      .arrow-line { stroke: #475569; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="960" height="900" fill="#fafbfc"/>

  <!-- Title -->
  <text x="40" y="44" class="title">W0 · 通俗审计 · 在做什么 / 准备怎么做</text>
  <text x="40" y="68" class="subtitle">P9 第一波: 修版本真相 + 收活跃 prose + 定升级语义 (6 个子波次, 17 个任务)</text>

  <!-- ========== SECTION 1: Before / After ========== -->
  <text x="40" y="110" class="section-title">① W0 在解决什么问题</text>

  <!-- Before card -->
  <g>
    <rect class="before-fill" x="40" y="125" width="420" height="150" rx="8"/>
    <rect fill="#ef4444" x="40" y="125" width="70" height="22" rx="4"/>
    <text x="75" y="140" class="tag" text-anchor="middle">W0 之前</text>
    <text x="58" y="170" class="card-title">项目 .sopify/sopify.json</text>
    <text x="58" y="188" class="card-body">bundle_version = "2026-05-31.142150" ← stale</text>
    <text x="58" y="206" class="card-body">CHANGELOG / skill header = "2026-06-10.191940"</text>
    <text x="58" y="224" class="card-body">.github/copilot-instructions.md = "2026-05-31..." ← 漂移</text>
    <text x="58" y="242" class="card-body">蓝图还在讲 "Validator / Runtime 是确定性加固线" (7 处)</text>
    <text x="58" y="260" class="card-body">0.0.0-dev 静默 fallback · cross_review_engine 残壳</text>
  </g>

  <!-- Arrow -->
  <g>
    <line class="arrow-line" x1="470" y1="200" x2="500" y2="200"/>
    <polygon fill="#475569" points="500,200 492,194 492,206"/>
    <text x="485" y="192" class="subtitle" text-anchor="middle">W0</text>
  </g>

  <!-- After card -->
  <g>
    <rect class="after-fill" x="510" y="125" width="410" height="150" rx="8"/>
    <rect fill="#10b981" x="510" y="125" width="70" height="22" rx="4"/>
    <text x="545" y="140" class="tag" text-anchor="middle">W0 之后</text>
    <text x="528" y="170" class="card-title">版本真相统一</text>
    <text x="528" y="188" class="card-body">5 个版本锚点全部对齐到当前 release</text>
    <text x="528" y="206" class="card-body">0.0.0-dev 不再静默 fallback (Fail-loud)</text>
    <text x="528" y="224" class="card-body">doctor 能说人话: "stale / 旧但可用 / 正常 / 损坏"</text>
    <text x="528" y="242" class="card-body">蓝图 prose 不再讲旧世界 (4 条 gate 全 PASS)</text>
    <text x="528" y="260" class="card-body">cross_review_engine 残壳归档, W1 基线稳</text>
  </g>

  <!-- ========== SECTION 2: 6 sub-waves ========== -->
  <text x="40" y="310" class="section-title">② W0 怎么做: 6 个子波次 (严格按顺序)</text>

  <!-- W0B -->
  <g>
    <rect class="w0-fill" x="40" y="325" width="280" height="105" rx="8"/>
    <rect fill="#3b82f6" x="40" y="325" width="50" height="20" rx="4"/>
    <text x="65" y="339" class="tag" text-anchor="middle">W0B</text>
    <text x="58" y="365" class="card-title">版本语义先裁定</text>
    <text x="58" y="383" class="card-body">· 外部项目 = exact pin</text>
    <text x="58" y="399" class="card-body">· dogfood = release-sync</text>
    <text x="58" y="415" class="card-body">· 0.0.0-dev = Fail-loud</text>
  </g>

  <!-- W0A -->
  <g>
    <rect class="w0-fill" x="340" y="325" width="280" height="105" rx="8"/>
    <rect fill="#3b82f6" x="340" y="325" width="50" height="20" rx="4"/>
    <text x="365" y="339" class="tag" text-anchor="middle">W0A</text>
    <text x="358" y="365" class="card-title">活跃 prose 清理</text>
    <text x="358" y="383" class="card-body">· background.md 旧叙事</text>
    <text x="358" y="399" class="card-body">· getting-started.md 示例</text>
    <text x="358" y="415" class="card-body">· release-process.md preflight</text>
  </g>

  <!-- W0C -->
  <g>
    <rect class="w0-fill" x="640" y="325" width="280" height="105" rx="8"/>
    <rect fill="#3b82f6" x="640" y="325" width="50" height="20" rx="4"/>
    <text x="665" y="339" class="tag" text-anchor="middle">W0C</text>
    <text x="658" y="365" class="card-title">安装器受控修复</text>
    <text x="658" y="383" class="card-body">· sopify_bundle.py (W0.7)</text>
    <text x="658" y="399" class="card-body">· sopify_init.py (W0.8)</text>
    <text x="658" y="415" class="card-body">· classifier (W0.10a) + 渲染 (W0.10b)</text>
  </g>

  <!-- W0D -->
  <g>
    <rect class="w0-fill" x="40" y="450" width="280" height="105" rx="8"/>
    <rect fill="#3b82f6" x="40" y="450" width="50" height="20" rx="4"/>
    <text x="65" y="464" class="tag" text-anchor="middle">W0D</text>
    <text x="58" y="490" class="card-title">installed artifact drift</text>
    <text x="58" y="508" class="card-body">· .github/copilot-instructions.md</text>
    <text x="58" y="524" class="card-body">· 策略: 查源 → 修源 → 重装</text>
    <text x="58" y="540" class="card-body">· 不手改 installed artifact</text>
  </g>

  <!-- W0E -->
  <g>
    <rect class="w0-fill" x="340" y="450" width="280" height="105" rx="8"/>
    <rect fill="#3b82f6" x="340" y="450" width="50" height="20" rx="4"/>
    <text x="365" y="464" class="tag" text-anchor="middle">W0E</text>
    <text x="358" y="490" class="card-title">deferred plan 残壳</text>
    <text x="358" y="508" class="card-body">· 20260418_cross_review_engine/</text>
    <text x="358" y="524" class="card-body">· 整个目录归档为 deferred</text>
    <text x="358" y="540" class="card-body">· 留 DEFERRED.md 指向外部仓</text>
  </g>

  <!-- W0F -->
  <g>
    <rect class="w0-fill" x="640" y="450" width="280" height="105" rx="8"/>
    <rect fill="#10b981" x="640" y="450" width="50" height="20" rx="4"/>
    <text x="665" y="464" class="tag" text-anchor="middle">W0F</text>
    <text x="658" y="490" class="card-title">Gate 验收 → 进 W1</text>
    <text x="658" y="508" class="card-body">· 漂移 gate 4 条全 PASS</text>
    <text x="658" y="524" class="card-body">· 5 版本锚点全 PASS</text>
    <text x="658" y="540" class="card-body">· 登记 W0 gate 结论</text>
  </g>

  <!-- Dependency arrows -->
  <g>
    <line class="arrow-line" x1="320" y1="378" x2="340" y2="378" stroke-dasharray="4 2"/>
    <polygon fill="#475569" points="340,378 332,372 332,384"/>
    <line class="arrow-line" x1="620" y1="378" x2="640" y2="378" stroke-dasharray="4 2"/>
    <polygon fill="#475569" points="640,378 632,372 632,384"/>
  </g>

  <!-- ========== SECTION 3: Upgrade semantics ========== -->
  <text x="40" y="595" class="section-title">③ W0 顺手定型: "已 bootstrap 项目怎么升级" 的语义</text>

  <g>
    <rect class="wave-fill" x="40" y="610" width="880" height="140" rx="8"/>

    <!-- 3 principle cards -->
    <g>
      <rect fill="#fff" x="60" y="625" width="270" height="110" rx="6" stroke="#cbd5e1"/>
      <rect fill="#6366f1" x="60" y="625" width="90" height="20" rx="4"/>
      <text x="105" y="639" class="tag" text-anchor="middle">不自动升级</text>
      <text x="78" y="665" class="card-body">宿主更新后, 项目 marker 默认</text>
      <text x="78" y="681" class="card-body">保留旧 pin (exact pin 可复现)</text>
      <text x="78" y="697" class="card-body">sopify_init.py:104 "旧值优先"</text>
      <text x="78" y="713" class="card-body">语义不动</text>
    </g>

    <g>
      <rect fill="#fff" x="345" y="625" width="270" height="110" rx="6" stroke="#cbd5e1"/>
      <rect fill="#f59e0b" x="345" y="625" width="90" height="20" rx="4"/>
      <text x="390" y="639" class="tag" text-anchor="middle">诊断责任</text>
      <text x="363" y="665" class="card-body">sopify_doctor.py 负责识别</text>
      <text x="363" y="681" class="card-body">4 状态: up_to_date / pinned_</text>
      <text x="363" y="697" class="card-body">old_but_healthy / stale / broken</text>
      <text x="363" y="713" class="card-body">每类 1 句白话 + 1 条下一步</text>
    </g>

    <g>
      <rect fill="#fff" x="630" y="625" width="270" height="110" rx="6" stroke="#cbd5e1"/>
      <rect fill="#10b981" x="630" y="625" width="90" height="20" rx="4"/>
      <text x="675" y="639" class="tag" text-anchor="middle">留给 W4</text>
      <text x="648" y="665" class="card-body">sopify update 命令是 W4 决策</text>
      <text x="648" y="681" class="card-body">候选, W0 不实施; 核心语义 =</text>
      <text x="648" y="697" class="card-body">"让项目 marker 与已装 payload</text>
      <text x="648" y="713" class="card-body">重新对齐", 不绑死资产同步</text>
    </g>
  </g>

  <!-- ========== SECTION 4: One sentence ========== -->
  <text x="40" y="790" class="section-title">④ 一句话定性</text>

  <g>
    <rect fill="#f1f5f9" x="40" y="805" width="880" height="75" rx="8" stroke="#94a3b8"/>
    <text x="480" y="835" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">W0 不是"做升级功能", 而是先把"项目怎么跟宿主更新对齐"这件事</text>
    <text x="480" y="860" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">讲清楚 (prose) · 判清楚 (doctor 4 状态) · 查得出来 (status/gate)。</text>
  </g>

  <text x="40" y="895" class="subtitle">数据来源: plan.md / tasks.md / bootstrap_workspace.py / sopify_init.py / sopify_bundle.py / sopify_doctor.py (2026-06-12 采集)</text>
</svg>
