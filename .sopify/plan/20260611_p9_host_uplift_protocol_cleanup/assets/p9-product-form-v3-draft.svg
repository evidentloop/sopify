<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" width="1400" height="640">
  <defs>
    <marker id="arr-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d4a574"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <style>
      text { font-family: -apple-system, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .ttl { font-family: Georgia, "Times New Roman", "Songti SC", serif; font-size: 26px; font-weight: 700; fill: #f5f0eb; letter-spacing: 0.5px; }
      .sub { font-family: Georgia, "Times New Roman", "Songti SC", serif; font-size: 13px; font-weight: 400; fill: #a39787; letter-spacing: 1.2px; }
      .lbl { font-family: Georgia, "Times New Roman", "Songti SC", serif; font-size: 11px; font-weight: 700; fill: #c9a96e; letter-spacing: 2px; opacity: 0.85; }
      .stage-num { font-family: Georgia, "Times New Roman", serif; font-size: 11px; font-weight: 700; fill: #6b5f53; letter-spacing: 1px; }
      .stage-title { font-size: 14px; font-weight: 700; fill: #f5f0eb; }
      .stage-sub { font-size: 10.5px; fill: #a39787; }
      .nm { font-size: 13px; font-weight: 600; fill: #f5f0eb; }
      .sm { font-size: 10px; fill: #a39787; }
      .fn { font-family: "Cascadia Code", "SF Mono", "Courier New", monospace; font-size: 10.5px; fill: #e8c49a; }
      .pill { font-size: 12px; font-weight: 600; fill: #e8c49a; letter-spacing: 0.5px; }
      .pill-sm { font-size: 9px; fill: #a39787; letter-spacing: 0.2px; }
      .phi { font-family: Georgia, "Times New Roman", "Songti SC", serif; font-size: 10.5px; font-weight: 400; fill: #c9a96e; font-style: italic; }
      .tag { font-family: Georgia, "Times New Roman", "Songti SC", serif; font-size: 15px; font-weight: 400; fill: #f5f0eb; font-style: italic; letter-spacing: 0.3px; }
      .arr-lbl { font-family: Georgia, "Times New Roman", serif; font-size: 8.5px; font-weight: 400; fill: #c9a96e; letter-spacing: 0.8px; }
      .foot { font-size: 10px; fill: #6b5f53; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1400" height="640" fill="#0a0a0a"/>
  <rect width="1400" height="640" fill="url(#glow)"/>

  <!-- Title (centered) -->
  <text x="700" y="54" text-anchor="middle" class="ttl">Sopify 产品形态</text>
  <text x="700" y="78" text-anchor="middle" class="sub">HOST ASKS  ·  SKILL GUIDES  ·  ASSETS PRESERVED  ·  ANY HOST RESUMES</text>

  <!-- Layout: stage w=206, gap=70. Stages at x=70, 346, 622, 898, 1174. Right margin=1400-1380=20 (tight) -->
  <!-- Actually: 5*206=1030; 4*70=280; total 1310; margins=(1400-1310)/2=45 each -->
  <!-- Re-calc with margin=45: stages at 45, 321, 597, 873, 1149. Right=1149+206=1355; margin=45. ✓ -->
  <!-- But user wants "左右留白一致" and "框之间再同时加点距离". Let me use margin=70 (nice), gap=66, stage=204: -->
  <!-- 5*204+4*66 = 1020+264 = 1284; margins=(1400-1284)/2=58 each. Not 70. -->
  <!-- Clean: margin=70, stage=204, gap=(1400-140-1020)/4=240/4=60. Stages at 70, 334, 598, 862, 1126. Right=1330, margin=70. Gap=60. -->
  <!-- Use: margin=70, stage=204, gap=60. -->

  <!-- ════════════ STAGE 1 : HOST (x=70, w=204, right=274) ════════════ -->
  <g>
    <rect x="70" y="120" width="204" height="340" rx="8" fill="#111111" stroke="#d4a574" stroke-width="0.8" stroke-dasharray="6,4"/>
    <text x="84" y="144" class="stage-num">I</text>
    <text x="102" y="144" class="lbl">HOST</text>
    <text x="84" y="170" class="stage-title">用户在任意宿主提需求</text>
    <text x="84" y="186" class="stage-sub">同一协议，四个入口</text>

    <!-- 4 host cards, ALL 86px wide. L-col right=170, R-col right=262. Stage right=274. -->
    <g transform="translate(84,206)">
      <rect width="86" height="44" rx="6" fill="#1a1a1a" stroke="#5a9e6f" stroke-width="1.3"/>
      <circle cx="14" cy="22" r="3.5" fill="#5a9e6f"/>
      <text x="24" y="20" class="nm">Codex</text>
      <text x="24" y="34" class="sm">verified</text>
    </g>
    <g transform="translate(176,206)">
      <rect width="86" height="44" rx="6" fill="#1a1a1a" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="3,2"/>
      <circle cx="14" cy="22" r="3.5" fill="#fbbf24"/>
      <text x="24" y="20" class="nm">Copilot</text>
      <text x="24" y="34" class="sm">baseline · W2</text>
    </g>
    <g transform="translate(84,260)">
      <rect width="86" height="44" rx="6" fill="#1a1a1a" stroke="#5a9e6f" stroke-width="1.3"/>
      <circle cx="14" cy="22" r="3.5" fill="#5a9e6f"/>
      <text x="24" y="20" class="nm">Claude</text>
      <text x="24" y="34" class="sm">verified</text>
    </g>
    <g transform="translate(176,260)">
      <rect width="86" height="44" rx="6" fill="#1a1a1a" stroke="#5a9e6f" stroke-width="1.3"/>
      <circle cx="14" cy="22" r="3.5" fill="#5a9e6f"/>
      <text x="24" y="20" class="nm">Qoder</text>
      <text x="24" y="34" class="sm">verified</text>
    </g>

    <text x="84" y="336" class="sm">同一 .sopify/ 项目</text>
    <text x="84" y="352" class="sm">任一宿主打开即消费</text>
    <text x="84" y="368" class="sm">同一份协议资产</text>

    <text x="84" y="438" class="fn">~go</text>
    <text x="110" y="438" class="sm"> · 用户发出请求</text>
  </g>

  <!-- Arrow 1 → 2 (gap 274→334, center x=304) -->
  <line x1="282" y1="290" x2="326" y2="290" stroke="#d4a574" stroke-width="1.2" marker-end="url(#arr-gold)"/>
  <text x="304" y="282" text-anchor="middle" class="arr-lbl">ASKS</text>

  <!-- ════════════ STAGE 2 : SKILL (x=334, w=204, right=538) ════════════ -->
  <g>
    <rect x="334" y="120" width="204" height="340" rx="8" fill="#111111" stroke="#d4a574" stroke-width="0.8" stroke-dasharray="6,4"/>
    <text x="348" y="144" class="stage-num">II</text>
    <text x="366" y="144" class="lbl">SKILL</text>
    <text x="348" y="170" class="stage-title">Skill 约束宿主做事</text>
    <text x="348" y="186" class="stage-sub">内置 workflow skill 沉淀社区哲学</text>

    <!-- 4 skill pills, all 176px wide, stacked -->
    <g transform="translate(348,206)">
      <rect width="176" height="40" rx="6" fill="#1a1a1a" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="12" y="17" class="pill">analyze</text>
      <text x="12" y="32" class="pill-sm">需求评分 · 缺事实则停下追问</text>
    </g>
    <g transform="translate(348,250)">
      <rect width="176" height="40" rx="6" fill="#1a1a1a" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="12" y="17" class="pill">design</text>
      <text x="12" y="32" class="pill-sm">方案包分级 · 任务拆分 · ADR</text>
    </g>
    <g transform="translate(348,294)">
      <rect width="176" height="40" rx="6" fill="#1a1a1a" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="12" y="17" class="pill">develop</text>
      <text x="12" y="32" class="pill-sm">按 tasks 顺序执行 · 证据回写</text>
    </g>
    <g transform="translate(348,338)">
      <rect width="176" height="40" rx="6" fill="#1a1a1a" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="12" y="17" class="pill">kb / templates</text>
      <text x="12" y="32" class="pill-sm">知识库回写 · 输出模板强约束</text>
    </g>

    <!-- Philosophy annotation (CENTERED at x=436 = stage center) -->
    <line x1="372" y1="392" x2="500" y2="392" stroke="#c9a96e" stroke-width="0.4" opacity="0.5"/>
    <text x="436" y="410" text-anchor="middle" class="phi">评分机制 · 收敛优先 · 证据前置</text>
    <text x="436" y="426" text-anchor="middle" class="phi">来自社区经验的哲学依据</text>
    <text x="436" y="442" text-anchor="middle" class="phi">不是 prompt，是方法论</text>
  </g>

  <!-- Arrow 2 → 3 (gap 538→598, center x=568) -->
  <line x1="546" y1="290" x2="590" y2="290" stroke="#d4a574" stroke-width="1.2" marker-end="url(#arr-gold)"/>
  <text x="568" y="282" text-anchor="middle" class="arr-lbl">GUIDES</text>

  <!-- ════════════ STAGE 3 : ASSETS (x=598, w=204, right=802) ════════════ -->
  <g>
    <rect x="598" y="120" width="204" height="340" rx="8" fill="#111111" stroke="#d4a574" stroke-width="0.8" stroke-dasharray="6,4"/>
    <text x="612" y="144" class="stage-num">III</text>
    <text x="630" y="144" class="lbl">ASSETS</text>
    <text x="612" y="170" class="stage-title">过程资产沉淀 .sopify/</text>
    <text x="612" y="186" class="stage-sub">方案 · 决策 · 交接 · 验证 全部留痕</text>

    <!-- 5 asset folders, all 176px wide, stacked -->
    <g transform="translate(612,206)">
      <rect width="176" height="38" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="1.3"/>
      <text x="12" y="16" class="fn">blueprint/</text>
      <text x="12" y="31" class="sm">项目长期记忆 · 设计基线</text>
    </g>
    <g transform="translate(612,248)">
      <rect width="176" height="38" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="1.3"/>
      <text x="12" y="16" class="fn">plan/</text>
      <text x="12" y="31" class="sm">当前方案 · plan.md · tasks.md</text>
    </g>
    <g transform="translate(612,290)">
      <rect width="176" height="38" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="1.3"/>
      <text x="12" y="16" class="fn">plan/*/receipts/</text>
      <text x="12" y="31" class="sm">决策 · 验证 · 交接证据</text>
    </g>
    <g transform="translate(612,332)">
      <rect width="176" height="38" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="1.3"/>
      <text x="12" y="16" class="fn">history/</text>
      <text x="12" y="31" class="sm">归档方案 + receipt.md</text>
    </g>
    <g transform="translate(612,374)">
      <rect width="176" height="38" rx="5" fill="#1a1a1a" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3,2"/>
      <text x="12" y="16" class="fn">state/</text>
      <text x="12" y="31" class="sm">active_plan · handoff（本地指针）</text>
    </g>
  </g>

  <!-- Arrow 3 → 4 (gap 802→862, center x=832) -->
  <line x1="810" y1="290" x2="854" y2="290" stroke="#d4a574" stroke-width="1.2" marker-end="url(#arr-gold)"/>
  <text x="832" y="282" text-anchor="middle" class="arr-lbl">PRESERVES</text>

  <!-- ════════════ STAGE 4 : HANDOFF (x=862, w=204, right=1066) ════════════ -->
  <g>
    <rect x="862" y="120" width="204" height="340" rx="8" fill="#111111" stroke="#d4a574" stroke-width="0.8" stroke-dasharray="6,4"/>
    <text x="876" y="144" class="stage-num">IV</text>
    <text x="894" y="144" class="lbl">HANDOFF</text>
    <text x="876" y="170" class="stage-title">停下 · 换宿主 · 继续</text>
    <text x="876" y="186" class="stage-sub">缺事实时停下，换 session / host 仍接续</text>

    <!-- 3 capability pills, all 176px wide, stacked -->
    <g transform="translate(876,206)">
      <rect width="176" height="54" rx="8" fill="#1a1a1a" stroke="#d4a574" stroke-width="1.3"/>
      <text x="14" y="24" class="pill">能停  STOP</text>
      <text x="14" y="42" class="pill-sm">事实缺失 / 待决策时主动停下等确认</text>
    </g>
    <g transform="translate(876,270)">
      <rect width="176" height="54" rx="8" fill="#1a1a1a" stroke="#d4a574" stroke-width="1.3"/>
      <text x="14" y="24" class="pill">能接  RESUME</text>
      <text x="14" y="42" class="pill-sm">state → plan → handoff → receipts</text>
    </g>
    <g transform="translate(876,334)">
      <rect width="176" height="54" rx="8" fill="#1a1a1a" stroke="#d4a574" stroke-width="1.3"/>
      <text x="14" y="24" class="pill">能查  TRACE</text>
      <text x="14" y="42" class="pill-sm">为什么这样做 · 谁批的 · 验证了什么</text>
    </g>
  </g>

  <!-- Arrow 4 → 5 (gap 1066→1126, center x=1096) -->
  <line x1="1074" y1="290" x2="1118" y2="290" stroke="#d4a574" stroke-width="1.2" marker-end="url(#arr-gold)"/>
  <text x="1096" y="282" text-anchor="middle" class="arr-lbl">RESUMES</text>

  <!-- ════════════ STAGE 5 : ARCHIVE (x=1126, w=204, right=1330, margin=70) ════════════ -->
  <g>
    <rect x="1126" y="120" width="204" height="340" rx="8" fill="#111111" stroke="#d4a574" stroke-width="0.8" stroke-dasharray="6,4"/>
    <text x="1140" y="144" class="stage-num">V</text>
    <text x="1158" y="144" class="lbl">ARCHIVE</text>
    <text x="1140" y="170" class="stage-title">归档 · 永久可审计</text>
    <text x="1140" y="186" class="stage-sub">方案与证据入 history，永久可回看</text>

    <g transform="translate(1140,206)">
      <rect width="176" height="44" rx="5" fill="#1a1a1a" stroke="#38bdf8" stroke-width="1.3"/>
      <text x="12" y="18" class="fn">history/YYYY-MM/</text>
      <text x="12" y="34" class="sm">归档方案 + receipt.md</text>
    </g>

    <!-- Stage 5 descriptive lines (CENTERED at x=1228 = stage center) -->
    <text x="1228" y="290" text-anchor="middle" class="sm">一个月后、一年后</text>
    <text x="1228" y="306" text-anchor="middle" class="sm">任何人、任何宿主</text>
    <text x="1228" y="322" text-anchor="middle" class="sm">都能看懂项目演进</text>

    <!-- Stage 5 philosophy (CENTERED at x=1228) -->
    <line x1="1164" y1="346" x2="1292" y2="346" stroke="#c9a96e" stroke-width="0.4" opacity="0.5"/>
    <text x="1228" y="366" text-anchor="middle" class="phi">审计链不是附加物</text>
    <text x="1228" y="382" text-anchor="middle" class="phi">是项目的第二价值</text>

    <text x="1228" y="438" text-anchor="middle" class="fn">~go finalize</text>
  </g>

  <!-- Tagline (centered) -->
  <line x1="70" y1="490" x2="1330" y2="490" stroke="#d4a574" stroke-width="0.5" opacity="0.3"/>
  <text x="700" y="524" text-anchor="middle" class="tag">"Host executes. Skill guides with community philosophy. .sopify/ preserves well-formed audit assets."</text>
  <text x="700" y="548" text-anchor="middle" class="sub">宿主做事 · Skill 把哲学变成方法 · .sopify/ 留高质量的审计资产 · 任意宿主接续 · 永久可查</text>

  <!-- Legend -->
  <g transform="translate(70,590)">
    <rect x="0" y="-10" width="14" height="14" rx="3" fill="none" stroke="#38bdf8" stroke-width="1.3"/>
    <text x="20" y="2" class="sm">git tracked（可携带）</text>

    <rect x="180" y="-10" width="14" height="14" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3,2"/>
    <text x="200" y="2" class="sm">git ignored（本地指针）</text>

    <rect x="376" y="-10" width="14" height="14" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
    <text x="396" y="2" class="sm">builtin skill（方法论）</text>

    <circle cx="560" cy="-3" r="3.5" fill="#5a9e6f"/>
    <text x="570" y="2" class="sm">protocol verified</text>

    <circle cx="690" cy="-3" r="3.5" fill="#fbbf24"/>
    <text x="700" y="2" class="sm">baseline · W2 uplift</text>
  </g>

  <text x="1330" y="622" text-anchor="end" class="foot">draft · W3 正式版基于 W1/W2 证据重做 · assets/p9-product-form-v3-draft.svg</text>
</svg>
