<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" width="1200" height="840"
     data-schema-version="1" data-style-id="1" data-diagram-type="architecture"
     data-semantic-profile="generic" data-semantic-valid="true"
     data-quality-profile="showcase">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC',
                   'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
    }
    .title { fill: #111827; font-size: 30px; font-weight: 600; }
    .subtitle { fill: #6b7280; font-size: 14px; }
    .section { fill: #2563eb; font-size: 14px; font-weight: 600; }
    .node-title { fill: #111827; font-size: 15px; font-weight: 600; }
    .node-sub { fill: #6b7280; font-size: 12px; }
    .edge-label { fill: #6b7280; font-size: 12px; }
    .legend { fill: #6b7280; font-size: 12px; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect data-graph-role="background" width="1200" height="840" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" class="title">Sopify 会话入口状态预检</text>
  <text x="600" y="74" text-anchor="middle" class="subtitle">先响应用户意图；只在相关 managed action 中读取状态；授权后才写入</text>

  <rect id="request-admission" data-graph-role="container" x="40" y="100" width="1120" height="220"
        rx="12" fill="#f8fafc" stroke="#dbe5f1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <rect id="managed-preflight" data-graph-role="container" x="40" y="340" width="1120" height="250"
        rx="12" fill="#f8fafc" stroke="#dbe5f1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <rect id="authorized-write" data-graph-role="container" x="570" y="620" width="590" height="140"
        rx="12" fill="#f8fafc" stroke="#dbe5f1" stroke-width="1.5" stroke-dasharray="6 5"/>

  <g data-graph-role="decoration">
    <text x="60" y="126" class="section">1  请求准入</text>
    <text x="60" y="366" class="section">2  Managed Preflight</text>
    <text x="590" y="646" class="section">3  授权写入与单次复核</text>
  </g>

  <!-- Arrows are painted before nodes so labels and component borders remain readable. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path id="request-to-intent" data-graph-role="edge" data-edge-id="request-to-intent"
          data-source="user-request" data-target="intent" d="M 240 182 H 315"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="intent-to-direct" data-graph-role="edge" data-edge-id="intent-to-direct"
          data-source="intent" data-target="direct-action" d="M 495 182 H 600"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="direct-to-reply" data-graph-role="edge" data-edge-id="direct-to-reply"
          data-source="direct-action" data-target="direct-reply" d="M 810 182 H 910"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="intent-to-managed" data-graph-role="edge" data-edge-id="intent-to-managed"
          data-source="intent" data-target="managed-entry" d="M 405 214 V 235"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="managed-to-files" data-graph-role="edge" data-edge-id="managed-to-files"
          data-source="managed-entry" data-target="file-protocol" d="M 405 299 V 375"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="mcp-to-files" data-graph-role="edge" data-edge-id="mcp-to-files"
          data-source="mcp-optional" data-target="file-protocol" d="M 235 420 H 275"
          stroke="#6b7280" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrow-gray)"/>
    <path id="files-to-eval" data-graph-role="edge" data-edge-id="files-to-eval"
          data-source="file-protocol" data-target="state-eval" d="M 535 420 H 650"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="eval-to-continue" data-graph-role="edge" data-edge-id="eval-to-continue"
          data-source="state-eval" data-target="continue" d="M 750 465 V 510"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="eval-to-ask" data-graph-role="edge" data-edge-id="eval-to-ask"
          data-source="state-eval" data-target="ask-once" d="M 850 420 H 1030 V 510"
          stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <path id="continue-to-writer" data-graph-role="edge" data-edge-id="continue-to-writer"
          data-source="continue" data-target="writer" d="M 750 574 V 660"
          stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <path id="writer-to-verify" data-graph-role="edge" data-edge-id="writer-to-verify"
          data-source="writer" data-target="verify-reply" d="M 850 692 H 930"
          stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  </g>

  <g data-graph-role="decoration" class="edge-label" text-anchor="middle">
    <text x="278" y="171">先分类</text>
    <text x="548" y="171">普通请求</text>
    <text x="860" y="171">立即完成</text>
    <text x="420" y="340">进入预检</text>
    <text x="255" y="409">可选</text>
    <text x="592" y="409">客观事实</text>
    <text x="765" y="493">可唯一判断</text>
    <text x="920" y="409">需要用户输入</text>
    <text x="775" y="618">授权动作</text>
    <text x="890" y="681">写入后复核</text>
  </g>

  <g id="user-request" data-graph-role="node" data-node-id="user-request">
    <rect x="80" y="150" width="160" height="64" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="160" y="178" text-anchor="middle" class="node-title">用户请求</text>
    <text x="160" y="199" text-anchor="middle" class="node-sub">问题 / 修复 / 方案操作</text>
  </g>
  <g id="intent" data-graph-role="node" data-node-id="intent">
    <polygon points="315,182 335,150 475,150 495,182 475,214 335,214"
             fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="405" y="178" text-anchor="middle" class="node-title">意图分类</text>
    <text x="405" y="199" text-anchor="middle" class="node-sub">先于状态读取</text>
  </g>
  <g id="direct-action" data-graph-role="node" data-node-id="direct-action">
    <rect x="600" y="150" width="210" height="64" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="705" y="178" text-anchor="middle" class="node-title">直接回答或修复</text>
    <text x="705" y="199" text-anchor="middle" class="node-sub">consult / quick fix</text>
  </g>
  <g id="direct-reply" data-graph-role="node" data-node-id="direct-reply">
    <rect x="910" y="150" width="190" height="64" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="1005" y="178" text-anchor="middle" class="node-title">完整回复用户</text>
    <text x="1005" y="199" text-anchor="middle" class="node-sub">不展示无关状态</text>
  </g>
  <g id="managed-entry" data-graph-role="node" data-node-id="managed-entry">
    <rect x="295" y="235" width="220" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <rect x="301" y="241" width="208" height="52" rx="7" fill="none" stroke="#fed7aa" stroke-width="1"/>
    <text x="405" y="258" text-anchor="middle" class="node-title">Managed Action</text>
    <text x="405" y="276" text-anchor="middle" class="node-sub">new / continue</text>
    <text x="405" y="291" text-anchor="middle" class="node-sub">finalize / write</text>
  </g>

  <g id="mcp-optional" data-graph-role="node" data-node-id="mcp-optional">
    <rect x="60" y="384" width="175" height="72" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="147.5" y="414" text-anchor="middle" class="node-title">workspace_status_lite</text>
    <text x="147.5" y="437" text-anchor="middle" class="node-sub">可选事实聚合</text>
  </g>
  <g id="file-protocol" data-graph-role="node" data-node-id="file-protocol">
    <rect x="275" y="375" width="260" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="405" y="403" text-anchor="middle" class="node-title">4 步文件协议</text>
    <text x="405" y="426" text-anchor="middle" class="node-sub">active_plan → plan.md</text>
    <text x="405" y="446" text-anchor="middle" class="node-sub">matching handoff → receipts</text>
  </g>
  <g id="state-eval" data-graph-role="node" data-node-id="state-eval">
    <rect x="650" y="375" width="200" height="90" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="656" y="381" width="188" height="78" rx="7" fill="none" stroke="#ddd6fe" stroke-width="1"/>
    <text x="750" y="406" text-anchor="middle" class="node-title">状态判断</text>
    <text x="750" y="429" text-anchor="middle" class="node-sub">正常 / 可继续异常</text>
    <text x="750" y="449" text-anchor="middle" class="node-sub">需补事实 / 需拍板</text>
  </g>
  <g id="continue" data-graph-role="node" data-node-id="continue">
    <rect x="650" y="510" width="200" height="64" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="750" y="538" text-anchor="middle" class="node-title">继续执行</text>
    <text x="750" y="559" text-anchor="middle" class="node-sub">静默通过或提示一次</text>
  </g>
  <g id="ask-once" data-graph-role="node" data-node-id="ask-once">
    <rect x="930" y="510" width="200" height="64" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1030" y="538" text-anchor="middle" class="node-title">只问一次并停车</text>
    <text x="1030" y="559" text-anchor="middle" class="node-sub">补事实或拍板</text>
  </g>

  <g id="writer" data-graph-role="node" data-node-id="writer">
    <rect x="650" y="660" width="200" height="64" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <rect x="656" y="666" width="188" height="52" rx="7" fill="none" stroke="#bbf7d0" stroke-width="1"/>
    <text x="750" y="688" text-anchor="middle" class="node-title">canonical writer</text>
    <text x="750" y="709" text-anchor="middle" class="node-sub">仅执行已授权写入</text>
  </g>
  <g id="verify-reply" data-graph-role="node" data-node-id="verify-reply">
    <rect x="930" y="660" width="200" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="1030" y="688" text-anchor="middle" class="node-title">复核一次并回复</text>
    <text x="1030" y="709" text-anchor="middle" class="node-sub">不重试、不循环</text>
  </g>

  <g id="legend" data-graph-role="legend" transform="translate(60, 800)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="42" y="4" class="legend">主流程</text>
    <line x1="130" y1="0" x2="160" y2="0" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrow-gray)"/>
    <text x="172" y="4" class="legend">可选 MCP</text>
    <line x1="285" y1="0" x2="315" y2="0" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="327" y="4" class="legend">受权写入</text>
  </g>
</svg>
