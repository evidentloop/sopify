<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"
  data-quality-profile="showcase" data-max-bends-per-edge="2" data-max-total-bends="8"
  data-max-route-stretch="1.35" data-max-bridged-crossings="0" data-min-node-gap="40"
  data-min-container-gutter="20" data-min-label-clearance="4" data-min-segment-length="16">
  <title id="title">Sopify request routing and managed resume workflow</title>
  <desc id="desc">Direct read-only questions stop after an evidence-based answer. Quick fixes stay scoped. Managed plans pass through analyze, design, develop, and finalize, and resume from repository evidence.</desc>
  <defs>
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#172033"/>
    </marker>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .title { font-size: 28px; font-weight: 760; letter-spacing: -0.02em; fill: #172033; }
      .subtitle { font-size: 14px; fill: #626b78; }
      .lane { font-size: 12px; font-weight: 760; letter-spacing: 0.08em; }
      .name { font-size: 24px; font-weight: 760; letter-spacing: -0.02em; fill: #172033; }
      .copy { font-size: 14px; fill: #626b78; }
      .badge { font-size: 12px; font-weight: 680; }
      .step { font-size: 13px; font-weight: 700; fill: #172033; }
      .rail-title { font-size: 12px; font-weight: 760; letter-spacing: 0.07em; fill: #7357b6; }
      .rail-name { font-size: 13px; font-weight: 720; fill: #172033; }
      .rail-copy { font-size: 10.5px; fill: #626b78; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#ffffff" data-graph-role="background"/>

  <text x="50" y="48" class="sans title">One request. The right amount of workflow</text>
  <text x="50" y="72" class="sans subtitle">Sopify routes by what you ask now—not by stale task state.</text>

  <path id="request-to-route" data-graph-role="edge" data-edge-id="request-to-route" data-source="request" data-target="route"
    data-bends="0" data-route-stretch="1" d="M 600 140 V 180" fill="none" stroke="#172033" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path id="route-to-direct" data-graph-role="edge" data-edge-id="route-to-direct" data-source="route" data-target="direct"
    data-bends="0" data-route-stretch="1" d="M 220 236 V 282" fill="none" stroke="#172033" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path id="route-to-quick" data-graph-role="edge" data-edge-id="route-to-quick" data-source="route" data-target="quick"
    data-bends="0" data-route-stretch="1" d="M 600 236 V 282" fill="none" stroke="#172033" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path id="route-to-managed" data-graph-role="edge" data-edge-id="route-to-managed" data-source="route" data-target="managed"
    data-bends="0" data-route-stretch="1" d="M 980 236 V 282" fill="none" stroke="#172033" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path id="managed-to-resume" data-graph-role="edge" data-edge-id="managed-to-resume" data-source="managed" data-target="resume-rail"
    data-bends="0" data-route-stretch="1" d="M 980 512 V 556" fill="none" stroke="#7357b6" stroke-width="2" marker-end="url(#arrow-ink)"/>

  <rect id="request" data-node-id="request" data-graph-role="node" x="450" y="86" width="300" height="54" rx="14" fill="#e7eefc" stroke="#2f67d8" stroke-width="1.5"/>
  <text x="600" y="119" text-anchor="middle" class="sans" font-size="16" font-weight="720" fill="#204fae">Your request</text>

  <rect id="route" data-node-id="route" data-graph-role="node" x="70" y="180" width="1060" height="56" rx="16" fill="#f7f3ea" stroke="#d8d1c3" stroke-width="1.5"/>
  <text x="600" y="214" text-anchor="middle" class="sans" font-size="15" font-weight="720" fill="#172033">Route by the request — not by stale plan state</text>

  <rect id="direct" data-node-id="direct" data-graph-role="node" x="50" y="282" width="340" height="230" rx="22" fill="#f8fbff" stroke="#2f67d8" stroke-width="1.5"/>
  <text x="78" y="320" class="mono lane" fill="#2f67d8">DIRECT · READ ONLY</text>
  <text x="78" y="363" class="sans name">Consult / inspect</text>
  <text x="78" y="397" class="sans copy">Answer with evidence, then stop.</text>
  <rect x="78" y="439" width="280" height="38" rx="10" fill="#e7eefc" data-graph-role="reserved"/>
  <text x="218" y="463" text-anchor="middle" class="sans badge" fill="#204fae">No plan · no state · no Git index</text>

  <rect id="quick" data-node-id="quick" data-graph-role="node" x="430" y="282" width="340" height="230" rx="22" fill="#f8fcfa" stroke="#147a64" stroke-width="1.5"/>
  <text x="458" y="320" class="mono lane" fill="#147a64">SCOPED CHANGE</text>
  <text x="458" y="363" class="sans name">Quick Fix</text>
  <text x="458" y="397" class="sans copy">Change → focused verify → report</text>
  <rect x="458" y="439" width="284" height="38" rx="10" fill="#e2f2ec" data-graph-role="reserved"/>
  <text x="600" y="463" text-anchor="middle" class="sans badge" fill="#0f705a">Does not resume an old plan</text>

  <rect id="managed" data-node-id="managed" data-graph-role="node" x="810" y="282" width="340" height="230" rx="22" fill="#fbf9ff" stroke="#7357b6" stroke-width="1.5"/>
  <text x="838" y="320" class="mono lane" fill="#7357b6">MANAGED WORK</text>
  <text x="838" y="363" class="sans name">Plan or continue</text>
  <g data-graph-role="decoration">
    <rect x="838" y="388" width="66" height="32" rx="9" fill="#eee8f8"/>
    <rect x="911" y="388" width="62" height="32" rx="9" fill="#eee8f8"/>
    <rect x="980" y="388" width="70" height="32" rx="9" fill="#eee8f8"/>
    <rect x="1057" y="388" width="67" height="32" rx="9" fill="#eee8f8"/>
    <text x="871" y="409" text-anchor="middle" class="sans step">Analyze</text>
    <text x="942" y="409" text-anchor="middle" class="sans step">Design</text>
    <text x="1015" y="409" text-anchor="middle" class="sans step">Develop</text>
    <text x="1090" y="409" text-anchor="middle" class="sans step">Finalize</text>
  </g>
  <rect x="838" y="439" width="284" height="38" rx="10" fill="#fff1e7" data-graph-role="reserved"/>
  <text x="980" y="463" text-anchor="middle" class="sans badge" fill="#9c491e">Pauses for missing facts or decisions</text>

  <rect id="resume-rail" data-graph-role="container" x="50" y="556" width="1100" height="140" rx="22" fill="#fcfbff" stroke="#d8d1c3" stroke-width="1.5"/>
  <text x="76" y="586" class="mono rail-title">MANAGED RESUME · CONTINUE / FINALIZE ONLY</text>
  <g data-graph-role="decoration">
    <rect x="298" y="606" width="174" height="42" rx="10" fill="#f7f3ea" stroke="#d8d1c3"/>
    <rect x="493" y="606" width="174" height="42" rx="10" fill="#e7eefc" stroke="#b8c8ec"/>
    <rect x="688" y="606" width="174" height="42" rx="10" fill="#f7f3ea" stroke="#d8d1c3"/>
    <rect x="883" y="606" width="174" height="42" rx="10" fill="#e2f2ec" stroke="#add8ca"/>
    <text x="385" y="624" text-anchor="middle" class="mono rail-name">active_plan</text>
    <text x="385" y="639" text-anchor="middle" class="sans rail-copy">optional local pointer</text>
    <text x="580" y="624" text-anchor="middle" class="mono rail-name">plan.md</text>
    <text x="580" y="639" text-anchor="middle" class="sans rail-copy">semantic truth</text>
    <text x="775" y="624" text-anchor="middle" class="mono rail-name">current_handoff</text>
    <text x="775" y="639" text-anchor="middle" class="sans rail-copy">optional resume hint</text>
    <text x="970" y="624" text-anchor="middle" class="mono rail-name">receipts/</text>
    <text x="970" y="639" text-anchor="middle" class="sans rail-copy">verified evidence</text>
    <text x="482" y="632" text-anchor="middle" class="sans" font-size="17" fill="#7357b6">→</text>
    <text x="677" y="632" text-anchor="middle" class="sans" font-size="17" fill="#7357b6">→</text>
    <text x="872" y="632" text-anchor="middle" class="sans" font-size="17" fill="#7357b6">→</text>
  </g>
  <text x="76" y="677" class="sans rail-copy">Plans and receipts are Git tracked. State pointers are local and may be absent.</text>
</svg>
