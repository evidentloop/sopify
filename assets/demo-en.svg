@keyframes tl9a { 0%{opacity:0} 35%{opacity:0} 36%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }

/* Scene 2 lines — Resume + Develop on Codex CLI */
.cl0 { animation: cl0a 30s linear infinite; opacity:0; }
@keyframes cl0a { 0%{opacity:0} 54%{opacity:0} 55%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
