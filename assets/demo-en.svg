  <text x="30" y="180" font-size="13" font-family="Menlo,Monaco,monospace" class="cl1"><tspan fill="#56d4c8">● </tspan><tspan fill="#6a6880">[sopify-ai]</tspan><tspan fill="#e8e8e8"> Develop </tspan><tspan fill="#56d4c8" font-weight="600">✓</tspan><tspan fill="#6a6880">  (resumed · checkpoint 1 → 3)</tspan></text>

