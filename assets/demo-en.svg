<!-- ══════════════════════════════════════════════════════════════════ -->
<!-- Scene 1: Analysis + Design — inside Claude Code                   -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<g class="scene1">
  <!-- Claude Code chrome: light macOS title bar -->
  <rect width="900" height="440" rx="12" fill="#002b36" clip-path="url(#main-clip)"/>
  <rect width="900" height="38" fill="#f3f3f6"/>
  <rect x="0" y="38" width="900" height="1" fill="#d0d0d4"/>
  <circle cx="16" cy="19" r="5.5" fill="#ff5f57"/>
  <circle cx="32" cy="19" r="5.5" fill="#febc2e"/>
  <circle cx="48" cy="19" r="5.5" fill="#28c840"/>
  <text x="450" y="23" text-anchor="middle" fill="#444444" font-size="12" font-family="-apple-system,sans-serif" font-weight="500">✱ sopify</text>

  <!-- Claude Code header: brand + model + directory -->
  <text x="24" y="68" font-size="13" font-family="Menlo,Monaco,monospace"><tspan fill="#e66f4d" font-weight="700">Claude Code</tspan></text>
  <text x="24" y="86" font-size="11" font-family="Menlo,Monaco,monospace"><tspan fill="#586e75">Sonnet 4.6 · ~/code/sopify</tspan></text>

  <!-- User input: > ~go Add Copilot trigger wiring to the installer -->
  <rect x="0" y="100" width="900" height="28" fill="#073642"/>
  <text x="24" y="119" font-size="13" font-family="Menlo,Monaco,monospace" class="tl0"><tspan fill="#586e75">&gt; </tspan><tspan fill="#b58900" font-weight="600">~go</tspan><tspan fill="#93a1a1"> Add Copilot trigger wiring to the installer</tspan></text>

  <!-- [sopify-ai] Analysis ? -->
  <text x="24" y="152" font-size="13" font-family="Menlo,Monaco,monospace" class="tl1"><tspan fill="#586e75">[sopify-ai]</tspan><tspan fill="#93a1a1"> Analysis </tspan><tspan fill="#b58900" font-weight="600">?</tspan></text>

  <!-- Score: 5/10 -->
  <text x="24" y="180" font-size="13" font-family="Menlo,Monaco,monospace" class="tl2"><tspan fill="#93a1a1">Score: </tspan><tspan fill="#cb4b16" font-weight="600">5/10</tspan><tspan fill="#586e75"> — two behaviors unspecified</tspan></text>

  <!-- Questions -->
  <text x="24" y="212" font-size="13" font-family="Menlo,Monaco,monospace" class="tl3"><tspan fill="#586e75">1. </tspan><tspan fill="#93a1a1">Trigger entry: instruction-only, or workspace marker + instruction?</tspan></text>
  <text x="24" y="236" font-size="13" font-family="Menlo,Monaco,monospace" class="tl4"><tspan fill="#586e75">2. </tspan><tspan fill="#93a1a1">.copilot/ directory: overwrite if exists, or merge?</tspan></text>

  <!-- User answer -->
  <rect x="0" y="255" width="900" height="28" fill="#073642"/>
  <text x="24" y="274" font-size="13" font-family="Menlo,Monaco,monospace" class="tl5"><tspan fill="#586e75">&gt; </tspan><tspan fill="#93a1a1">instruction + marker; merge with existing .copilot/</tspan></text>

  <!-- [sopify-ai] Design ✓ -->
  <text x="24" y="306" font-size="13" font-family="Menlo,Monaco,monospace" class="tl6"><tspan fill="#586e75">[sopify-ai]</tspan><tspan fill="#93a1a1"> Design </tspan><tspan fill="#859900" font-weight="600">✓</tspan></text>

  <!-- Plan path + Tasks + Quality -->
  <text x="24" y="336" font-size="13" font-family="Menlo,Monaco,monospace" class="tl7"><tspan fill="#586e75">Plan:    </tspan><tspan fill="#93a1a1">.sopify-skills/plan/20260530_copilot_trigger/</tspan></text>
  <text x="24" y="358" font-size="13" font-family="Menlo,Monaco,monospace" class="tl8"><tspan fill="#586e75">Tasks:   </tspan><tspan fill="#b58900" font-weight="600">3</tspan><tspan fill="#586e75"> items</tspan></text>
  <text x="24" y="380" font-size="13" font-family="Menlo,Monaco,monospace" class="tl9"><tspan fill="#586e75">Quality: </tspan><tspan fill="#859900" font-weight="600">9/10</tspan><tspan fill="#586e75">  |  Readiness: </tspan><tspan fill="#859900" font-weight="600">8/10</tspan></text>

  <!-- Bottom status bar -->
  <rect x="0" y="405" width="900" height="1" fill="#073642"/>
  <text x="24" y="425" font-size="10" font-family="Menlo,Monaco,monospace"><tspan fill="#586e75">sopify</tspan></text>
  <text x="830" y="425" font-size="10" font-family="Menlo,Monaco,monospace" text-anchor="end"><tspan fill="#586e75">Sonnet 4.6</tspan></text>
</g>

<!-- ══════════════════════════════════════════════════════════════════ -->
<!-- Transition                                                        -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<g class="transition">
  <rect width="900" height="440" rx="12" fill="#0a0a0a" clip-path="url(#main-clip)"/>
  <text x="450" y="205" text-anchor="middle" font-size="15" font-family="-apple-system,sans-serif" fill="#555555">⏸  1 day later · different machine</text>
  <text x="450" y="235" text-anchor="middle" font-size="13" font-family="-apple-system,sans-serif" fill="#444444">switching from Claude Code → Codex CLI</text>
</g>

<!-- ══════════════════════════════════════════════════════════════════ -->
