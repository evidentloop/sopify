.tl5 { animation: tl5a 30s linear infinite; opacity:0; }
@keyframes tl5a { 0%{opacity:0} 21%{opacity:0} 22%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
.tl6 { animation: tl6a 30s linear infinite; opacity:0; }
@keyframes tl6a { 0%{opacity:0} 27%{opacity:0} 28%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
.tl7 { animation: tl7a 30s linear infinite; opacity:0; }
@keyframes tl7a { 0%{opacity:0} 30%{opacity:0} 31%{opacity:1} 44%{opacity:1} 48%{opacity:0} 100%{opacity:0} }
