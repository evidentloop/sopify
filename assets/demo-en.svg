.cl6 { animation: cl6a 30s linear infinite; opacity:0; }
@keyframes cl6a { 0%{opacity:0} 71%{opacity:0} 71.5%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
.cl7 { animation: cl7a 30s linear infinite; opacity:0; }
@keyframes cl7a { 0%{opacity:0} 72%{opacity:0} 72.5%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
.cl8 { animation: cl8a 30s linear infinite; opacity:0; }
