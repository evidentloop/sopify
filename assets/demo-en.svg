  <text x="54" y="278" font-size="11" font-family="Menlo,Monaco,monospace" class="cl5"><tspan fill="#504d60">- </tspan><tspan fill="#cccccc">installer/copilot/trigger.py</tspan></text>
  <text x="54" y="296" font-size="11" font-family="Menlo,Monaco,monospace" class="cl6"><tspan fill="#504d60">- </tspan><tspan fill="#cccccc">installer/copilot/templates/instructions.md</tspan></text>
