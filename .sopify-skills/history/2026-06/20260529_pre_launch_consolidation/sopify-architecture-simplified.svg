  <rect x="310" y="490" width="175" height="50" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.2"/>
  <text x="397" y="511" text-anchor="middle" class="node-name" style="font-size:12px">Plan</text>
  <text x="397" y="528" text-anchor="middle" class="node-desc">Active work packages</text>
  <rect x="520" y="490" width="175" height="50" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.2"/>
  <text x="607" y="511" text-anchor="middle" class="node-name" style="font-size:12px">History</text>
  <text x="607" y="528" text-anchor="middle" class="node-desc">Archived decisions</text>
  <rect x="730" y="490" width="150" height="50" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.2"/>
  <text x="805" y="511" text-anchor="middle" class="node-name" style="font-size:12px">project.md</text>
  <text x="805" y="528" text-anchor="middle" class="node-desc">Tech conventions</text>
  <rect x="910" y="490" width="120" height="50" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.2"/>
  <text x="970" y="511" text-anchor="middle" class="node-name" style="font-size:12px">user/</text>
  <text x="970" y="528" text-anchor="middle" class="node-desc">Prefs + feedback</text>
  <text x="550" y="600" text-anchor="middle" class="slogan">Host LLM is only a proposal source</text>
  <text x="550" y="618" text-anchor="middle" class="slogan">Validator is the sole authorizer — Work resumes from project state, not chat history</text>
  <rect x="860" y="590" width="200" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="876" y="607" class="tier-label" fill="#6b7280">LEGEND</text>
  <line x1="876" y1="622" x2="900" y2="622" stroke="#2563eb" stroke-width="1.5"/>
  <text x="908" y="626" class="node-desc">Protocol flow</text>
