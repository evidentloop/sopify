  <line x1="550" y1="242" x2="596" y2="242" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="800" y1="242" x2="826" y2="242" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <rect x="80" y="310" width="520" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="96" y="330" class="tier-label" fill="#059669">INDEPENDENT CORE</text>
  <text x="96" y="346" class="node-desc">sopify_contracts (1,227 LOC) + canonical_writer (605 LOC) — runtime-free</text>
  <rect x="630" y="310" width="200" height="45" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="646" y="330" class="tier-label" fill="#7c3aed">PLUGINS</text>
