<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .tier-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; }
    .node-name { font-size: 13px; font-weight: 600; fill: #111827; }
    .node-desc { font-size: 10px; fill: #6b7280; }
    .slogan { font-size: 12px; font-weight: 500; fill: #374151; }
    .arrow-label { font-size: 10px; font-weight: 500; }
  </style>
  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#059669"/></marker>
    <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ea580c"/></marker>
  </defs>
  <rect width="1100" height="700" fill="#ffffff"/>
