      <text x="40" y="15" text-anchor="middle" font-size="10" fill="#14532d" font-weight="bold">git-tracked</text>
    </g>
    <g transform="translate(102,72)">
      <rect width="86" height="22" rx="11" fill="#fef3c7" stroke="#92400e" stroke-width="1" filter="url(#sketchy-light)"/>
      <text x="43" y="15" text-anchor="middle" font-size="10" fill="#78350f" font-weight="bold">不可变事实</text>
    </g>

    <rect x="14" y="102" width="252" height="32" rx="6" fill="#dcfce7" stroke="#166534" stroke-width="1" stroke-dasharray="3,2" filter="url(#sketchy-light)"/>
    <text x="140" y="122" text-anchor="middle" font-size="11" fill="#14532d">用户心智 · "这件事的最终档案"</text>

    <g transform="translate(24,150)">
      <rect width="232" height="48" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1.4" filter="url(#sketchy-light)"/>
      <text x="116" y="21" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">plan.md / tasks.md / design.md</text>
      <text x="116" y="38" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">整包搬入（保留原貌）</text>
    </g>

    <g transform="translate(24,210)">
      <rect width="232" height="48" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1.4" filter="url(#sketchy-light)"/>
      <text x="116" y="21" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">receipts/</text>
      <text x="116" y="38" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">exec / verify / final 凭证（过程审计）</text>
    </g>

    <g transform="translate(24,270)">
      <rect width="232" height="48" rx="8" fill="#ffffff" stroke="#166534" stroke-width="1.4" filter="url(#sketchy-light)"/>
      <text x="116" y="21" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">assets/</text>
      <text x="116" y="38" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">图 / 截图 / 长参考</text>
    </g>

    <!-- receipt.md (final audit; emphasized) -->
    <g transform="translate(24,330)">
      <rect width="232" height="70" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2" filter="url(#sketchy-light)"/>
      <text x="116" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">receipt.md  ★</text>
      <text x="116" y="40" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">最终可审计收据</text>
      <text x="116" y="56" text-anchor="middle" font-size="9" fill="#15803d">outcome / summary / key_decisions</text>
    </g>

    <text x="140" y="430" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">目录约定：</text>
    <text x="140" y="448" text-anchor="middle" font-size="10" fill="#166534" font-family="Menlo, monospace">history/YYYY-MM/</text>
    <text x="140" y="464" text-anchor="middle" font-size="10" fill="#166534" font-family="Menlo, monospace">  └─ &lt;plan_id&gt;/</text>
  </g>

  <!-- ============ KEY DATA FLOW ARROWS ============ -->
  <!-- plan/<id>/ → history/<plan_id>/ (finalize whole package move) -->
  <path d="M 800 340 C 830 340, 840 340, 860 340"
        stroke="#059669" stroke-width="3" fill="none"
        marker-end="url(#arrow-archive)" filter="url(#sketchy-light)"/>
  <text x="830" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">finalize</text>
  <text x="830" y="360" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">整包搬入</text>

  <!-- state/active_plan points to plan/<id>/ -->
  <path d="M 400 210 L 460 210"
        stroke="#ea580c" stroke-width="1.8" stroke-dasharray="4,3" fill="none"
        marker-end="url(#arrow-promote)" opacity="0.7"/>
  <text x="430" y="200" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">定位</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(40,620)">
    <rect x="0" y="0" width="1120" height="120" rx="10" fill="#ffffff" stroke="#9ca3af" stroke-width="1.2" filter="url(#sketchy-light)"/>
    <text x="20" y="22" font-size="13" font-weight="bold" fill="#1f2937">图例 · Legend</text>

    <g transform="translate(20,40)">
      <rect width="22" height="16" rx="3" fill="#fecaca" stroke="#991b1b" stroke-width="1.4" stroke-dasharray="4,2"/>
      <text x="30" y="12" font-size="11" fill="#374151">state/ · gitignored · 仅 2 文件</text>
    </g>
    <g transform="translate(280,40)">
      <rect width="22" height="16" rx="3" fill="#bfdbfe" stroke="#1e40af" stroke-width="1.6"/>
      <text x="30" y="12" font-size="11" fill="#374151">plan/ · git-tracked · 方案本体 + 过程审计</text>
    </g>
    <g transform="translate(600,40)">
      <rect width="22" height="16" rx="3" fill="#bbf7d0" stroke="#166534" stroke-width="1.4"/>
      <text x="30" y="12" font-size="11" fill="#374151">history/ · git-tracked · 最终档案</text>
    </g>
    <g transform="translate(900,40)">
      <path d="M 0 8 L 40 8" stroke="#059669" stroke-width="2.6" fill="none" marker-end="url(#arrow-archive)"/>
      <text x="50" y="12" font-size="11" fill="#374151">finalize 整包搬入</text>
    </g>

    <g transform="translate(20,72)">
      <path d="M 0 8 L 40 8" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-read)"/>
      <text x="50" y="12" font-size="11" fill="#374151">host 4 步读顺序（数字编号）</text>
    </g>
    <g transform="translate(280,72)">
      <text x="0" y="12" font-size="11" fill="#1e3a8a" font-weight="bold">★ plan.md = 唯一语义入口（真相源）</text>
    </g>
    <g transform="translate(600,72)">
      <text x="0" y="12" font-size="11" fill="#14532d" font-weight="bold">★ receipt.md = 最终可审计收据</text>
    </g>
    <g transform="translate(900,72)">
      <text x="0" y="12" font-size="11" fill="#b45309" font-weight="bold">required_host_action = AI 等人信号</text>
    </g>

    <text x="20" y="108" font-size="10" fill="#6b7280" font-style="italic">
      Core state files: 6 → 2  ·  handoff 单态（只在 state/）  ·  "AI 等人" 折叠到 current_handoff.required_host_action
    </text>
  </g>

  <text x="600" y="754" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">
    P8 Protocol Kernel &amp; Runtime Retirement · 极简协议层架构
  </text>
</svg>
