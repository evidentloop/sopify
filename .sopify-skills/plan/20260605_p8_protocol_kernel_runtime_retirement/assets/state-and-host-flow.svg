    <g transform="translate(24,150)">
      <rect width="292" height="70" rx="8" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2.4" filter="url(#sketchy-light)"/>
      <circle cx="24" cy="22" r="14" fill="#93c5fd" stroke="#1e3a8a" stroke-width="1.6"/>
      <text x="24" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">2</text>
      <text x="160" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">plan.md  ★ 唯一语义入口</text>
      <text x="160" y="44" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">Context/Why · Scope · Approach · 进度 · Next</text>
      <text x="160" y="58" text-anchor="middle" font-size="9" fill="#3b82f6">host 第二读目标；承担 background 职责；真相源</text>
    </g>

    <g transform="translate(24,234)">
      <rect width="292" height="40" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="1.4" stroke-dasharray="4,3" filter="url(#sketchy-light)"/>
      <text x="146" y="20" text-anchor="middle" font-size="12" fill="#1e3a8a">tasks.md  <tspan fill="#6b7280" font-style="italic">(可选 · standard+)</tspan></text>
      <text x="146" y="34" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">任务多 / 依赖复杂时拆出</text>
    </g>

    <g transform="translate(24,286)">
      <rect width="292" height="40" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="1.4" stroke-dasharray="4,3" filter="url(#sketchy-light)"/>
      <text x="146" y="20" text-anchor="middle" font-size="12" fill="#1e3a8a">design.md  <tspan fill="#6b7280" font-style="italic">(可选 · architecture)</tspan></text>
      <text x="146" y="34" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">架构 / 协议 / 状态模型变更才有</text>
    </g>

    <!-- receipts (step 4; emphasized) -->
    <g transform="translate(24,338)">
      <rect width="292" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2" filter="url(#sketchy-light)"/>
      <circle cx="24" cy="22" r="14" fill="#bbf7d0" stroke="#166534" stroke-width="1.6"/>
      <text x="24" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">4</text>
      <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">receipts/  (过程审计资产)</text>
      <text x="160" y="44" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">exec_NNN.json · verify_NNN.json · final.json</text>
      <text x="160" y="60" text-anchor="middle" font-size="9" fill="#15803d">按 timestamp 取最新；host 据此判断"是否验证过"</text>
      <text x="160" y="74" text-anchor="middle" font-size="9" fill="#14532d" font-weight="bold">条件必备（managed plan 必写）</text>
    </g>

    <g transform="translate(24,430)">
      <rect width="292" height="32" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="1.4" stroke-dasharray="4,3" filter="url(#sketchy-light)"/>
      <text x="146" y="22" text-anchor="middle" font-size="11" fill="#1e3a8a">assets/  <tspan fill="#6b7280" font-style="italic">(可选 · 图 / 截图 / 长参考)</tspan></text>
    </g>

    <text x="170" y="478" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">finalize 时整包搬入 history/</text>
  </g>

  <!-- ============ LAYER 3: history/<id>/ ============ -->
  <g transform="translate(860,110)">
