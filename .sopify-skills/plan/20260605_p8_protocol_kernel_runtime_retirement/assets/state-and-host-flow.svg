<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Comic Sans MS', 'Segoe Print', 'Kaiti SC', 'PingFang SC', cursive">
  <defs>
    <filter id="sketchy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
    </filter>
    <filter id="sketchy-light" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>
    <marker id="arrow-promote" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#ea580c" stroke="#9a3412" stroke-width="0.6"/>
    </marker>
    <marker id="arrow-archive" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#059669" stroke="#065f46" stroke-width="0.6"/>
    </marker>
    <marker id="arrow-read" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fdf6e3"/>

  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2937">
    图 1 · Sopify 极简协议层架构
  </text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#6b7280" font-style="italic">
    state/ (2 文件) · plan/&lt;id&gt;/ (方案 + 过程审计) · history/&lt;id&gt;/ (最终档案)
  </text>

  <!-- Host icon -->
  <g transform="translate(40,100)">
    <circle cx="22" cy="14" r="9" fill="#fef3c7" stroke="#92400e" stroke-width="1.6" filter="url(#sketchy-light)"/>
    <path d="M 22 24 L 22 48 M 22 32 L 10 42 M 22 32 L 34 42 M 22 48 L 12 62 M 22 48 L 32 62"
          stroke="#92400e" stroke-width="1.6" fill="none" filter="url(#sketchy-light)"/>
    <text x="22" y="80" text-anchor="middle" font-size="12" fill="#92400e" font-weight="bold">任意 AI Host</text>
    <text x="22" y="94" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">按 4 步读顺序</text>
  </g>

  <!-- Reading order arrows from host -->
  <path d="M 90 150 Q 180 140 210 200" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-read)" opacity="0.6"/>
  <path d="M 90 160 Q 360 200 480 240" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-read)" opacity="0.6"/>
  <path d="M 90 170 Q 540 260 880 250" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-read)" opacity="0.6"/>

  <!-- ============ LAYER 1: state/ (极简 2 文件) ============ -->
  <g transform="translate(120,110)">
    <rect x="0" y="0" width="280" height="480" rx="12" fill="#fef2f2" stroke="#991b1b" stroke-width="2" stroke-dasharray="6,4" filter="url(#sketchy)"/>
    <rect x="0" y="0" width="280" height="62" rx="12" fill="#fecaca" stroke="#991b1b" stroke-width="2" filter="url(#sketchy)"/>
    <text x="140" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#7f1d1d">state/</text>
    <text x="140" y="48" text-anchor="middle" font-size="11" fill="#7f1d1d" font-style="italic">定位针 + 恢复提示（极简 2 文件）</text>

    <g transform="translate(14,72)">
      <rect width="74" height="22" rx="11" fill="#f3f4f6" stroke="#6b7280" stroke-width="1" filter="url(#sketchy-light)"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" fill="#374151" font-weight="bold">gitignored</text>
    </g>
    <g transform="translate(96,72)">
      <rect width="86" height="22" rx="11" fill="#fef3c7" stroke="#92400e" stroke-width="1" filter="url(#sketchy-light)"/>
      <text x="43" y="15" text-anchor="middle" font-size="10" fill="#78350f" font-weight="bold">可丢可重建</text>
    </g>

    <rect x="14" y="102" width="252" height="32" rx="6" fill="#fff7ed" stroke="#c2410c" stroke-width="1" stroke-dasharray="3,2" filter="url(#sketchy-light)"/>
    <text x="140" y="122" text-anchor="middle" font-size="11" fill="#9a3412">用户心智 · "定位针 + 恢复提示"</text>

    <!-- File 1: active_plan (step 1) -->
    <g transform="translate(24,150)">
      <rect width="232" height="78" rx="8" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" filter="url(#sketchy-light)"/>
      <circle cx="24" cy="22" r="14" fill="#bfdbfe" stroke="#1e3a8a" stroke-width="1.6"/>
      <text x="24" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">1</text>
      <text x="132" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a" font-family="Menlo, monospace">active_plan.json</text>
      <text x="116" y="46" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">定位：{ "plan_id": "..." }</text>
      <text x="116" y="62" text-anchor="middle" font-size="9" fill="#3b82f6">bootstrapping 锚；如无 → consult / new-plan</text>
    </g>

    <!-- File 2: current_handoff (step 3, after plan.md) -->
    <g transform="translate(24,244)">
      <rect width="232" height="110" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.8" filter="url(#sketchy-light)"/>
      <circle cx="24" cy="22" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1.6"/>
      <text x="24" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f">3</text>
      <text x="132" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="#78350f" font-family="Menlo, monospace">current_handoff.json</text>
      <text x="116" y="46" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">恢复提示 + 是否等用户</text>
      <text x="116" y="64" text-anchor="middle" font-size="9" fill="#b45309">required_host_action 字段表达：</text>
      <text x="116" y="80" text-anchor="middle" font-size="9" fill="#78350f" font-family="Menlo, monospace">continue_host_develop /</text>
      <text x="116" y="94" text-anchor="middle" font-size="9" fill="#78350f" font-family="Menlo, monospace">answer_questions / confirm_decision / ...</text>
    </g>

    <!-- Deletion callout -->
    <g transform="translate(24,374)">
      <rect width="232" height="80" rx="6" fill="#fee2e2" stroke="#991b1b" stroke-width="1" stroke-dasharray="4,3" filter="url(#sketchy-light)"/>
      <text x="116" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">P8 显式删除：</text>
      <text x="116" y="34" text-anchor="middle" font-size="9" fill="#7f1d1d" font-family="Menlo, monospace">current_plan.json</text>
      <text x="116" y="48" text-anchor="middle" font-size="9" fill="#7f1d1d" font-family="Menlo, monospace">current_run.json</text>
      <text x="116" y="62" text-anchor="middle" font-size="9" fill="#7f1d1d" font-family="Menlo, monospace">current_clarification.json</text>
      <text x="116" y="76" text-anchor="middle" font-size="9" fill="#7f1d1d" font-family="Menlo, monospace">current_decision.json 等</text>
    </g>

    <text x="140" y="470" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">≠ 长期事实源</text>
  </g>

  <!-- ============ LAYER 2: plan/<id>/ ============ -->
  <g transform="translate(460,110)">
    <rect x="0" y="0" width="340" height="480" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="2.4" filter="url(#sketchy)"/>
    <rect x="0" y="0" width="340" height="62" rx="12" fill="#bfdbfe" stroke="#1e40af" stroke-width="2.4" filter="url(#sketchy)"/>
    <text x="170" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a8a">plan/&lt;plan_id&gt;/</text>
    <text x="170" y="48" text-anchor="middle" font-size="11" fill="#1e3a8a" font-style="italic">方案本体 + 过程审计（plan_id 是接续主键）</text>

    <g transform="translate(14,72)">
