<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .wave-label { font-size: 11px; font-weight: 700; fill: #6b7280; letter-spacing: 0.08em; }
    .dir-badge { font-size: 10px; font-weight: 700; fill: #ffffff; }
    .dir-title { font-size: 13px; font-weight: 600; fill: #111827; }
    .dir-desc { font-size: 10px; fill: #6b7280; }
    .dir-count { font-size: 10px; font-weight: 500; fill: #374151; }
    .readme-tag { font-size: 9px; font-weight: 600; fill: #ea580c; }
    .largest-tag { font-size: 8px; font-weight: 700; fill: #dc2626; }
    .legend-text { font-size: 10px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="ar-solid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
    <marker id="ar-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#93c5fd"/></marker>
    <marker id="ar-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#7c3aed"/></marker>
