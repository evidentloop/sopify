  <line x1="210" y1="395" x2="210" y2="470" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ar-purple)"/>
  <path d="M 560 395 L 560 435 L 400 435 L 400 470" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#ar-purple)"/>
